name: Test API STAC Nativo (MeteoSwiss)

on:
  workflow_dispatch:

jobs:
  plot_map:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: System Dependencies (ecCodes)
        run: |
          sudo apt-get update
          sudo apt-get install -y libeccodes-tools libeccodes-dev

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup Ecosistema MeteoSwiss (meteodata-lab)
        run: |
          git clone https://github.com/MeteoSwiss/opendata-nwp-demos.git
          cd opendata-nwp-demos
          pip install poetry
          poetry config virtualenvs.create false
          # geopandas aggiunto qui per gestire gli shapefile
          poetry run pip install geopandas 
          poetry install --no-ansi

      - name: Esegui Python Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Copia script E cartella shapefiles nel workspace di lavoro
          cp icon_ch2_ens_map.py opendata-nwp-demos/
          cp -r shapefiles opendata-nwp-demos/ 2>/dev/null || true
          cd opendata-nwp-demos
          python icon_ch2_ens_map.py
