name: Invio Anomalie Settimanali (45 Giorni)

on:
  schedule:
    # Corre ai minuti 21 delle ore 12, 14, 16, 18 (UTC) SOLAMENTE il Lunedì (giorno 1)
    - cron: '21 12,14,16,18 * * 1'
  workflow_dispatch:

jobs:
  genera_e_invia_settimanale:
    runs-on: ubuntu-latest
    permissions:
      contents: write 

    steps:
      - name: Checkout del codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: |
          python -m pip install --upgrade pip
          pip install requests numpy pandas matplotlib

      - name: Esegui Script
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python seasonal_weekly.py

      - name: Salva il file hash dei dati
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add ultimo_hash_seasonal_weekly.txt || true
          git commit -m "Aggiornamento hash settimanale [skip ci]" || echo "Nessun nuovo run"
          git push